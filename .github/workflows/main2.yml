name: CD - Deploy Docker Image to EC2

on:
  workflow_run:
    workflows: ["CI - Docker Build & Push"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker stop simple-web || true
            docker rm simple-web  || true
            docker pull ${{ secrets.DOCKER_USERNAME }}/simple-web:latest
            docker run -d \
              --name ec2-cicd \
              -p 80:80 \
              ${{ secrets.DOCKER_USERNAME }}/simple-web:latest
